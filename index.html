<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="shortcut icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0d" />
    <!-- dx fonts — self-hosted, preloaded. No Google/Fontshare roundtrip. -->
    <link rel="preload" href="/fonts/MonaspaceNeon-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/MonaspaceArgon-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="figgg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>figgg</title>
  </head>
  <body style="margin:0;background:#0b0b0d;color:#FAFAFA">
    <div id="root"></div>
    <div id="boot-error" style="display:none;min-height:100vh;justify-content:center;align-items:center;font-family:monospace;background:#0b0b0d;color:#FAFAFA;text-align:center;padding:2rem">
      <div>
        <h1 style="font-size:2rem;margin:0 0 .5rem;font-family:monospace">figgg<span style="color:#4F9DFF">/</span></h1>
        <p style="color:#A3A3A3;margin:0 0 1rem;font-family:monospace" id="boot-error-msg">something broke. reload.</p>
        <button onclick="location.reload()" style="padding:.75rem 1.5rem;background:transparent;color:#4F9DFF;border:1px solid #4F9DFF;border-radius:2px;font-size:1rem;cursor:pointer;font-family:monospace">reload</button>
      </div>
    </div>
    <script>
      function showBootError(text) {
        var el = document.getElementById('boot-error');
        var msg = document.getElementById('boot-error-msg');
        if (el && !document.getElementById('root').children.length) {
          el.style.display = 'flex';
          if (msg && text) msg.textContent = text;
        }
      }
      window.addEventListener('error', function(e) { showBootError(e.message); });
      window.addEventListener('unhandledrejection', function(e) {
        showBootError(e.reason?.message || e.reason || 'Unhandled promise rejection');
      });
      // Hide boot-error once React mounts (covers race where error fires before mount)
      new MutationObserver(function(_, obs) {
        var root = document.getElementById('root');
        if (root && root.children.length) {
          document.getElementById('boot-error').style.display = 'none';
          obs.disconnect();
        }
      }).observe(document.getElementById('root'), { childList: true });
      setTimeout(function() {
        if (!document.getElementById('root').children.length) {
          showBootError('App failed to load within 10 seconds. Try clearing site data or opening in an incognito window.');
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
